name: Magic26 CI probe

on:
  workflow_dispatch:
    inputs:
      snapshot_suffix:
        description: "Expected dashboard snapshot suffix"
        required: false
        default: "20210101_20260702"
      data_through:
        description: "Expected dashboard data_through"
        required: false
        default: "2026-07-02"
      run_finmind_probe:
        description: "Run FinMind completeness probe (requires FINMIND_TOKEN secret for authenticated quota)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: magic26-ci-probe
  cancel-in-progress: false

jobs:
  probe:
    name: Static package and refresh feasibility probe
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      SNAPSHOT_SUFFIX: ${{ inputs.snapshot_suffix }}
      DATA_THROUGH: ${{ inputs.data_through }}
      APP_CACHE_BUST: "20260702riskv2"
      CSS_CACHE_BUST: "20260701q"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install Python dependencies
        run: python -m pip install -r requirements-ci.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Compile Python scripts
        run: python -m py_compile scripts/*.py

      - name: Check frontend syntax
        run: node --check public/app.js

      - name: Verify committed static dashboard package
        run: >-
          python scripts/verify_magic26_package.py
          --snapshot-suffix "$SNAPSHOT_SUFFIX"
          --data-through "$DATA_THROUGH"
          --app-cache-bust "$APP_CACHE_BUST"
          --css-cache-bust "$CSS_CACHE_BUST"

      - name: Refresh probe dry-run only
        if: ${{ inputs.run_finmind_probe }}
        run: >-
          python scripts/daily_refresh_magic26.py
          --dry-run
          --lookback-days 10
          --stop-after-complete 2

      - name: Guardrail - no generated changes in probe
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "CI probe changed files unexpectedly:"
            git status --short
            exit 1
          fi
